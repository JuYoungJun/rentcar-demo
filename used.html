<div class="car-list-page">
  <h1 class="page-title">중고차 장기렌트</h1>
  <div class="sort-bar">
    <button class="sort-btn" id="sortBtn">
      <span>추천순</span>

  </div>
  <div class="car-list-grid" id="carListGrid"></div>
</div>
<div id="footer-include"></div>
<script src="js/common.js" defer></script>
<script>
document.addEventListener('DOMContentLoaded', () => {

    const cars = carDatabase.filter(c => c.category.includes('used'));
    const fullList = [...cars, ...cars, ...cars].slice(0, 9);
    // No badge for used cars per mockup
    renderCarCards('carListGrid', fullList, '', 'used');
    initSortBar('carListGrid', fullList, '', 'used');

    if (window.HaetaeSEO) {
      const S = window.HaetaeSEO;
      const prices = cars.map(c => c.price).filter(p => p > 0);
      try {
        S.inject([
          S.webpage({
            type: 'CollectionPage',
            url: '/used.html',
            title: '중고차 장기렌트 — 해태렌트카',
            description: '정기 점검·검증을 마친 중고차로 합리적인 월 비용. 무심사·무보증 옵션 포함.',
            image: '/images/banner_1.webp',
            breadcrumb: S.breadcrumb([{ name:'홈', url:'/' }, { name:'중고차 장기렌트', url:'/used.html' }]),
            speakableSelectors: ['.page-title']
          }),
          S.service({
            url: '/used.html',
            serviceType: '자동차 임대업 (중고차 장기렌트)',
            name: '중고차 장기렌트',
            description: '점검·검증을 마친 중고차 라인업으로 신차 대비 합리적인 월 비용',
            lowPrice: prices.length ? Math.min(...prices) : 400000,
            highPrice: prices.length ? Math.max(...prices) : 1200000,
            offerCount: cars.length
          }),
          S.vehicleList(cars, 'used', '/used.html')
        ]);
      } catch (e) {}
    }
});
</script>
