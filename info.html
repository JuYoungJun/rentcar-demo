<body data-page="legal">

  <div id="header-include"></div>

  <main class="legal-doc">
    <h1 class="legal-title">이용안내</h1>
    <span class="legal-effective">최종 갱신 2026년 5월 8일</span>

    <div class="legal-intro" id="infoIntro"></div>
    <div id="infoSections"></div>
  </main>

  <div id="footer-include"></div>

  <script src="js/common.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.HaetaeSEO) {
        const S = window.HaetaeSEO;
        try {
          S.inject([
            S.webpage({
              type: 'WebPage',
              url: '/info.html',
              title: '이용안내 — 해태렌트카',
              description: '상담 신청부터 차량 인수까지 4단계 절차, 필요 서류, 인수·반납·보험 안내.',
              image: '/images/banner_1.webp',
              breadcrumb: S.breadcrumb([{ name: '홈', url: '/' }, { name: '이용안내', url: '/info.html' }]),
              speakableSelectors: ['.legal-title', '.legal-section h2', '.legal-section p']
            }),
            S.howto('/info.html')
          ]);
        } catch (e) { }
      }

      const esc = s => String(s == null ? '' : s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[c]);
      const inline = s => esc(s).replace(/\n/g, '<br>').replace(/&lt;strong&gt;(.+?)&lt;\/strong&gt;/g, '<strong>$1</strong>');

      // 인라인 폴백 — common.js 로드 실패 시에도 기본 안내가 노출됨
      const FALLBACK = {
        intro: '해태렌트카의 렌트 절차와 필요 서류를 안내해 드립니다. 추가로 궁금하신 부분은 견적 문의 또는 전화 상담으로 알려주세요.',
        sections: [
          { title: '1. 상담 및 견적', body: '홈페이지 견적 문의 양식 또는 전화로 상담을 요청하시면, 전담 상담사가 차종·기간·예산을 함께 검토하여 맞춤 견적을 안내해 드립니다.' },
          { title: '2. 차량 선택 및 가계약', body: '추천드린 차량을 비교·선택하신 후 가계약 단계로 진행됩니다.' },
          { title: '3. 필요 서류', body: '신분증 사본, 운전면허증 사본, 재직증명서 / 사업자등록증 등이 필요할 수 있습니다.' },
          { title: '4. 본 계약 및 결제', body: '서류 검수 완료 후 본 계약서를 작성합니다.' },
          { title: '5. 차량 인수', body: '약속된 일자에 차량을 직접 인수하거나 탁송 서비스를 이용하실 수 있습니다.' },
          { title: '6. 계약 기간 중', body: '정기점검·소모품 관리, 사고·고장 시 24시간 긴급 출동 서비스를 운영합니다.' },
          { title: '7. 차량 반납', body: '계약 만료 시 인수 지점에서 차량을 반납하시면 됩니다.' },
        ],
      };

      function render(data) {
        document.getElementById('infoIntro').textContent = data.intro || '';
        const wrap = document.getElementById('infoSections');
        wrap.innerHTML = (data.sections || []).map(s => `
      <section class="legal-section">
        <h2>${esc(s.title)}</h2>
        <p>${inline(s.body)}</p>
      </section>
    `).join('');
      }

      try {
        const data = (typeof loadInfo === 'function') ? loadInfo() : FALLBACK;
        render(data || FALLBACK);
      } catch (e) {
        console.error('이용안내 렌더 실패:', e);
        render(FALLBACK);
      }
    });
  </script>
