<body data-page="longterm">
  <div id="header-include"></div>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-slide active">
      <picture>
        <source media="(max-width: 768px)" srcset="images/hero_longterm_mobile.webp">
        <img src="images/hero_longterm.webp" alt="12개월 기간약정으로 더욱 합리적으로 — 해태렌트카" fetchpriority="high" decoding="async"
          width="2400" height="616">
      </picture>
    </div>
  </div>

  <div class="car-list-page">
    <h1 class="page-title">12개월 기간약정</h1>
    <div class="sort-bar">
      <button type="button" class="sort-btn" id="sortBtn">
        <span>추천순</span>
        <span class="sort-icon"><span></span><span></span><span></span></span>
      </button>
      <div class="sort-dropdown" id="sortDropdown">
        <button type="button" class="sort-option active" data-sort="recommend">추천순</button>
        <button type="button" class="sort-option" data-sort="price-low">가격 낮은 순</button>
        <button type="button" class="sort-option" data-sort="price-high">가격 높은 순</button>
      </div>
    </div>
    <div class="car-list-grid" id="carListGrid"></div>
  </div>

  <div id="footer-include"></div>
  <script src="js/common.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const getCars = () => (Array.isArray(window.carDatabase) ? window.carDatabase : [])
        .filter(c => Array.isArray(c.category) && c.category.includes('longterm'));

      const renderList = () => {
        const cars = getCars();
        renderCarCards('carListGrid', cars, '12개월', 'longterm');
        initSortBar('carListGrid', cars, '12개월', 'longterm');
      };

      renderList();
      document.addEventListener('rentcar:hydrated', renderList);

      if (window.HaetaeSEO) {
        const S = window.HaetaeSEO;
        const cars = getCars();
        const prices = cars.map(c => c.price).filter(p => p > 0);
        try {
          S.inject([
            S.webpage({
              type: 'CollectionPage',
              url: '/longterm.html',
              title: '기간약정월렌트 6~24개월 — 해태렌트카',
              description: '신용 부담 없이 6~24개월 약정으로 월 임대료 고정 할인. 무심사·무보증 옵션 포함.',
              image: '/images/banner_1.webp',
              breadcrumb: S.breadcrumb([{ name: '홈', url: '/' }, { name: '기간약정월렌트', url: '/longterm.html' }]),
              speakableSelectors: ['.page-title']
            }),
            S.service({
              url: '/longterm.html',
              serviceType: '자동차 임대업 (기간약정월렌트)',
              name: '기간약정월렌트 (6~24개월 장기)',
              description: '6~24개월 약정으로 월 임대료 고정 할인 — 무심사·무보증 옵션 포함',
              lowPrice: prices.length ? Math.min(...prices) : 450000,
              highPrice: prices.length ? Math.max(...prices) : 1100000,
              offerCount: cars.length,
              audience: '저신용자, 자영업자, 일반 소비자'
            }),
            S.vehicleList(cars, 'longterm', '/longterm.html')
          ]);
        } catch (e) { }
      }
    });
  </script>
