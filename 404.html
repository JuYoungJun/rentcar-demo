<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지를 찾을 수 없습니다 (404) — 해태렌트카</title>
  <meta name="description" content="요청하신 페이지를 찾을 수 없습니다. 홈으로 돌아가거나 견적 문의를 이용해 주세요.">
  <meta name="robots" content="noindex,follow">
  <link rel="canonical" href="http://haetae1.com/404.html">
  <meta name="theme-color" content="#E53935">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="images/icon-192.png">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap">
  <link rel="stylesheet" href="css/common.css">
  <style>
    .error-page {
      min-height: calc(100vh - 200px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      text-align: center
    }

    .error-inner {
      max-width: 560px
    }

    .error-code {
      font-size: clamp(72px, 12vw, 140px);
      font-weight: 900;
      color: var(--red);
      line-height: 1;
      letter-spacing: -0.04em
    }

    .error-title {
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 800;
      color: var(--dark);
      margin: 18px 0 12px
    }

    .error-desc {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.8;
      margin-bottom: 32px
    }

    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap
    }

    .error-btn {
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: transform .15s
    }

    .error-btn--primary {
      background: var(--red);
      color: #fff
    }

    .error-btn--secondary {
      background: #f3f4f6;
      color: var(--dark)
    }

    .error-btn:hover {
      transform: translateY(-2px)
    }

    .error-links {
      margin-top: 36px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-light)
    }

    .error-links a {
      color: var(--red);
      text-decoration: none;
      margin: 0 8px
    }

    .error-links a:hover {
      text-decoration: underline
    }
  </style>
</head>

<body data-page="error">
  <div id="header-include"></div>
  <main class="error-page">
    <div class="error-inner">
      <div class="error-code">404</div>
      <h1 class="error-title">페이지를 찾을 수 없습니다</h1>
      <p class="error-desc">
        주소가 변경되었거나, 더 이상 존재하지 않는 페이지일 수 있습니다.<br>
        아래 메뉴에서 원하시는 정보를 찾아보세요.
      </p>
      <div class="error-actions">
        <a href="/" class="error-btn error-btn--primary">홈으로 이동</a>
        <a href="quote.html" class="error-btn error-btn--secondary">견적 문의하기</a>
      </div>
      <div class="error-links">
        <a href="monthly.html">월렌트</a> ·
        <a href="longterm.html">12개월 기간약정</a> ·
        <a href="used.html">중고차 장기렌트</a> ·
        <a href="about.html">회사소개</a>
      </div>
    </div>
  </main>
  <div id="footer-include"></div>
  <script src="js/common.js" defer></script>
</body>

</html>
