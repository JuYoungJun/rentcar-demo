<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>해태렌트카 - 최고의 렌트카 서비스</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/common.css">
</head>
<body data-page="home">

<div id="header-include"></div>

<!-- HERO -->
<div class="hero" id="heroSlider">
  <div class="hero-slide active" style="background-image:url('images/banner_1.png')"></div>
  <div class="hero-slide" style="background-image:url('images/banner_2.png')"></div>
</div>

<!-- MAIN -->
<div class="main-content">

  <!-- Search -->
  <div class="search-bar">
    <div class="search-field-wrap">
      <div class="search-field" id="regionField">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        <span id="regionText">지역 선택</span>
      </div>
      <div class="dropdown-panel" id="regionDropdown">
        <div class="dropdown-item" data-value="서울">서울</div>
        <div class="dropdown-item" data-value="경기">경기</div>
        <div class="dropdown-item" data-value="인천">인천</div>
        <div class="dropdown-item" data-value="부산">부산</div>
        <div class="dropdown-item" data-value="대구">대구</div>
        <div class="dropdown-item" data-value="광주">광주</div>
        <div class="dropdown-item" data-value="대전">대전</div>
        <div class="dropdown-item" data-value="제주">제주</div>
      </div>
    </div>
    <div class="search-field-wrap">
      <div class="search-field" id="dateField">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        <span id="dateText">날짜 선택</span>
      </div>
      <div class="dropdown-panel" id="dateDropdown">
        <div class="dropdown-item" data-value="1개월">1개월</div>
        <div class="dropdown-item" data-value="3개월">3개월</div>
        <div class="dropdown-item" data-value="6개월">6개월</div>
        <div class="dropdown-item" data-value="12개월">12개월</div>
        <div class="dropdown-item" data-value="24개월">24개월</div>
      </div>
    </div>
    <button class="btn-search" id="searchBtn">차량 검색</button>
  </div>

  <!-- BEST -->
  <div class="best-section fade-up">
    <div class="best-label">월렌트 BEST</div>
    <div class="best-car-name" id="bestCarName">제네시스 G80</div>
    <a href="#contact" class="best-inquiry">문의하기 &gt;</a>
    <div class="best-content">
      <div class="best-car-img"><div class="img-placeholder"></div></div>
      <div class="top5">
        <div class="top5-heading">금주 TOP 5</div>
        <ul class="top5-list" id="top5List"></ul>
      </div>
    </div>
  </div>

  <!-- 월렌트 -->
  <div class="section-block fade-up">
    <div class="section-heading">월렌트</div>
    <div class="cards-grid" id="monthlyCards"></div>
    <div class="slider-dots" id="monthlyDots"></div>
    <a href="monthly.html" class="view-all-link">전체 보기 &gt;</a>
  </div>

  <!-- 저신용 장기렌트 -->
  <div class="section-block fade-up">
    <div class="section-heading">저신용 장기렌트</div>
    <div class="cards-grid" id="longtermCards"></div>
    <div class="slider-dots" id="longtermDots"></div>
    <a href="longterm.html" class="view-all-link">전체 보기 &gt;</a>
  </div>
</div>

<!-- CONTACT -->
<div class="contact-section" id="contact">
  <div class="contact-inner">
    <div class="contact-left fade-up">
      <div class="contact-label">견적 문의</div>
      <div class="contact-desc">안전과 투명한 운영을 최우선으로<br>믿고 맡길 수 있는 렌트카 서비스를 제공합니다.</div>
      <div class="contact-phone">0000-0000</div>
      <div class="contact-hours">평일 오전 9:00 - 오후 6:00<br>주말 오전 10:00 - 오후 4:00</div>
    </div>
    <div class="contact-form fade-up">
      <select id="formCategory">
        <option value="" disabled selected>카테고리를 선택해주세요.</option>
        <option value="월렌트">월렌트</option>
        <option value="저신용 장기렌트">저신용 장기렌트</option>
        <option value="중고차 장기렌트">중고차 장기렌트</option>
      </select>
      <input type="text" id="formCar" placeholder="희망하시는 차량명을 입력해주세요.">
      <div class="form-row">
        <input type="text" id="formName" placeholder="이름">
        <input type="text" id="formPhone" placeholder="연락처">
      </div>
      <textarea id="formMessage" placeholder="그 외 문의사항"></textarea>
      <label class="privacy-label">
        <input type="checkbox" id="formPrivacy"> 개인정보 취급방침에 동의합니다.
      </label>
      <button class="btn-submit" id="submitBtn">견적문의하기</button>
    </div>
  </div>
</div>

<div id="footer-include"></div>

<script src="js/common.js" defer></script>
<script>
window.addEventListener('load', () => {
  // HERO slider (auto-rotate, no UI)
  const heroSlides = document.querySelectorAll('#heroSlider .hero-slide');
  if (heroSlides.length > 1) {
    let heroIdx = 0;
    setInterval(() => {
      heroSlides[heroIdx].classList.remove('active');
      heroIdx = (heroIdx + 1) % heroSlides.length;
      heroSlides[heroIdx].classList.add('active');
    }, 4500);
  }

  // TOP 5
  const engine = new Top5RankingEngine();
  const top5 = engine.getTopN(carDatabase);
  document.getElementById('bestCarName').textContent = top5[0].name;
  const list = document.getElementById('top5List');
  top5.forEach((car, i) => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="top5-num ${i < 3 ? 'red' : 'gray'}">${i+1}</span>${car.name}`;
    li.onclick = () => showToast(`${car.name} 상세 페이지로 이동합니다.`);
    list.appendChild(li);
  });

  // Cards
  renderCarCards('monthlyCards', carDatabase.filter(c => c.category.includes('monthly')).slice(0, 3), null, 'monthly');
  renderCarCards('longtermCards', carDatabase.filter(c => c.category.includes('longterm')).slice(0, 3), null, 'longterm');
  initSliderDots('monthlyCards', 'monthlyDots');
  initSliderDots('longtermCards', 'longtermDots');

  // Dropdowns
  const regionField = document.getElementById('regionField'), regionDD = document.getElementById('regionDropdown'), regionText = document.getElementById('regionText');
  const dateField = document.getElementById('dateField'), dateDD = document.getElementById('dateDropdown'), dateText = document.getElementById('dateText');
  let selRegion = '', selDate = '';
  regionField.onclick = e => { e.stopPropagation(); regionDD.classList.toggle('open'); dateDD.classList.remove('open'); };
  dateField.onclick = e => { e.stopPropagation(); dateDD.classList.toggle('open'); regionDD.classList.remove('open'); };
  regionDD.querySelectorAll('.dropdown-item').forEach(i => i.onclick = () => { selRegion = i.dataset.value; regionText.textContent = selRegion; regionText.style.color = '#333'; regionDD.classList.remove('open'); });
  dateDD.querySelectorAll('.dropdown-item').forEach(i => i.onclick = () => { selDate = i.dataset.value; dateText.textContent = selDate; dateText.style.color = '#333'; dateDD.classList.remove('open'); });
  document.addEventListener('click', () => { regionDD.classList.remove('open'); dateDD.classList.remove('open'); });

  document.getElementById('searchBtn').onclick = () => {
    if (!selRegion) return showToast('지역을 선택해주세요.');
    if (!selDate) return showToast('기간을 선택해주세요.');
    showToast(`${selRegion} / ${selDate} 조건으로 차량을 검색합니다.`);
  };

  // Form
  document.getElementById('submitBtn').onclick = () => {
    const cat = document.getElementById('formCategory').value;
    const car = document.getElementById('formCar').value.trim();
    const name = document.getElementById('formName').value.trim();
    const phone = document.getElementById('formPhone').value.trim();
    const priv = document.getElementById('formPrivacy').checked;
    if (!cat) return showToast('카테고리를 선택해주세요.');
    if (!car) return showToast('차량명을 입력해주세요.');
    if (!name) return showToast('이름을 입력해주세요.');
    if (!phone) return showToast('연락처를 입력해주세요.');
    if (!priv) return showToast('개인정보 취급방침에 동의해주세요.');
    showToast('견적 문의가 접수되었습니다!');
    document.getElementById('formCategory').selectedIndex = 0;
    ['formCar','formName','formPhone','formMessage'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('formPrivacy').checked = false;
  };
  document.getElementById('formCategory').onchange = function() { this.classList.add('selected'); };
  document.getElementById('formPhone').oninput = function() {
    let v = this.value.replace(/\D/g, '').slice(0, 11);
    if (v.length >= 8) this.value = v.replace(/(\d{3})(\d{4})(\d{0,4})/, '$1-$2-$3');
    else if (v.length >= 4) this.value = v.replace(/(\d{3})(\d{0,4})/, '$1-$2');
    else this.value = v;
  };
});
</script>
</body>
</html>
