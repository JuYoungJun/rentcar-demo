<div class="car-list-page">
  <h1 class="page-title">월렌트</h1>
  <div class="sort-bar">
    <button type="button" class="sort-btn" id="sortBtn">

<script>
document.addEventListener('DOMContentLoaded', () => {

    const cars = carDatabase.filter(c => c.category.includes('monthly'));
    const fullList = [...cars, ...cars, ...cars, ...cars].slice(0, 12);
    renderCarCards('carListGrid', fullList, '1개월', 'monthly');
    initSortBar('carListGrid', fullList, '1개월', 'monthly');

    // ── SEO / GEO / AEO — Service + ItemList + Breadcrumb ──
    if (window.HaetaeSEO) {
      const S = window.HaetaeSEO;
      const prices = cars.map(c => c.price).filter(p => p > 0);
      try {
        S.inject([
          S.webpage({
            type: 'CollectionPage',
            url: '/monthly.html',
            title: '월렌트 차량 전체 리스트 — 해태렌트카',
            description: '모닝·레이·캐스퍼·아반떼·K5·소나타·셀토스·카니발·그랜저 등 19개 차종 — 무심사·무보증 옵션 포함.',
            image: '/images/banner_1.webp',
            breadcrumb: S.breadcrumb([{ name:'홈', url:'/' }, { name:'월렌트', url:'/monthly.html' }]),
            speakableSelectors: ['.page-title']
          }),
          S.service({
            url: '/monthly.html',
            serviceType: '자동차 임대업 (월렌트)',
            name: '월렌트 (1개월 단위 단기 렌트)',
            description: '1개월 단위 자유 이용 가능, 무심사·무보증 옵션 포함',
            lowPrice: prices.length ? Math.min(...prices) : 550000,
            highPrice: prices.length ? Math.max(...prices) : 1200000,
            offerCount: cars.length
          }),
          S.vehicleList(cars, 'monthly', '/monthly.html')
        ]);
      } catch (e) {}
    }
});
</script>
