<body data-page="legal">

  <div id="header-include"></div>

  <main class="legal-doc" id="legalDoc">
    <h1 class="legal-title" id="legalTitle">개인정보처리방침</h1>
    <span class="legal-effective" id="legalEffective"></span>
    <div class="legal-intro" id="legalIntro"></div>
    <div id="legalSections"></div>
    <div class="legal-note" id="legalNote" hidden></div>
  </main>

  <div id="footer-include"></div>

  <script src="js/common.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.HaetaeSEO) {
        const S = window.HaetaeSEO;
        try {
          S.inject([
            S.webpage({
              type: 'WebPage',
              url: '/privacy.html',
              title: '개인정보처리방침 — 해태렌트카',
              description: '수집·이용 목적, 보유 기간, 제3자 제공, 정보주체 권리, 안전성 확보 조치.',
              image: '/images/banner_1.webp',
              breadcrumb: S.breadcrumb([{ name: '홈', url: '/' }, { name: '개인정보처리방침', url: '/privacy.html' }]),
              speakableSelectors: ['.legal-title', '.legal-section h2', '.legal-section p']
            }),
            {
              '@type': 'DigitalDocument',
              '@id': S.SITE + '/privacy.html#document',
              name: '개인정보처리방침',
              inLanguage: 'ko-KR',
              publisher: { '@id': S.SITE + '/#organization' },
              about: { '@id': S.SITE + '/#localbusiness' }
            }
          ]);
        } catch (e) { }
      }

      const esc = s => String(s == null ? '' : s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[c]);
      const inline = s => esc(s).replace(/\n/g, '<br>').replace(/&lt;strong&gt;(.+?)&lt;\/strong&gt;/g, '<strong>$1</strong>');

      const FALLBACK = {
        title: '개인정보처리방침',
        effective: '시행일자 2026년 5월 8일',
        intro: '해태렌트카(이하 "회사")는 「개인정보 보호법」 등 관련 법령을 준수하여 정보주체의 개인정보를 안전하게 처리하기 위해 본 개인정보처리방침을 수립·공개합니다.',
        sections: [
          { title: '1. 수집하는 개인정보의 항목', body: '회사는 견적 문의·계약·상담 시 다음 정보를 수집합니다: 이름, 연락처, 희망 차량명, 카테고리, 희망 지역, 희망 기간, 운전 경력.' },
          { title: '2. 개인정보의 처리 목적', body: '수집된 정보는 견적 회신·상담, 차량 임대차 계약 체결·인수 안내, 본인 확인 및 부정 이용 방지, 통계·분석 목적으로만 사용됩니다.' },
          { title: '3. 개인정보의 보유 및 이용 기간', body: '견적 문의 정보: 회신 완료 후 1년 / 계약 관련 기록: 5년 / 표시·광고 기록: 6개월 / 방문 기록: 3개월.' },
          { title: '4. 개인정보의 제3자 제공', body: '회사는 정보주체의 사전 동의가 있거나 법령에 의해 요구되는 경우를 제외하고는 개인정보를 외부에 제공하지 않습니다.' },
          { title: '5. 정보주체의 권리', body: '정보주체는 언제든지 개인정보 열람·정정·삭제·처리 정지·동의 철회를 요청할 수 있으며 회사는 지체 없이 조치합니다.' },
          { title: '6. 안전성 확보 조치', body: '회사는 개인정보 취급 직원 최소화·정기 교육, 접근권한 관리·접속 기록 보관 등 관리·기술·물리적 조치를 시행합니다.' },
          {
            title: '7. 개인정보 보호책임자',
            body: '회사는 정보주체의 개인정보를 보호하고 관련 불만을 처리하기 위해 아래와 같이 개인정보 보호책임자를 지정하고 있습니다.\n• 성명: 이창은 (대표이사)\n• 연락처: 010-6611-6633\n• 이메일: privacy@haetae1.com\n정보주체는 위 연락처로 개인정보 관련 문의·불만·피해 구제를 요청할 수 있으며, 회사는 신속히 답변·처리해드립니다.'
          },
          {
            title: '8. 권익침해 구제 방법',
            body: '개인정보 침해로 인한 신고나 상담이 필요하신 경우 아래 기관에 문의하실 수 있습니다.\n• 개인정보침해 신고센터 (privacy.go.kr / 국번없이 182)\n• 개인정보 분쟁조정위원회 (kopico.go.kr / 1833-6972)\n• 대검찰청 사이버수사과 (spo.go.kr / 국번없이 1301)\n• 경찰청 사이버수사국 (cyberbureau.police.go.kr / 국번없이 182)'
          },
        ],
      };

      function render(data) {
        document.getElementById('legalTitle').textContent = data.title || '';
        document.getElementById('legalEffective').textContent = data.effective || '';
        document.getElementById('legalIntro').textContent = data.intro || '';
        const wrap = document.getElementById('legalSections');
        wrap.innerHTML = (data.sections || []).map(s => `
      <section class="legal-section">
        <h2>${esc(s.title)}</h2>
        <p>${inline(s.body)}</p>
      </section>
    `).join('');
        if (data.note) {
          const n = document.getElementById('legalNote');
          n.hidden = false;
          n.textContent = data.note;
        }
        document.title = (data.title || '문서') + ' - 해태렌트카';
      }

      try {
        const data = (typeof loadPrivacy === 'function') ? loadPrivacy() : FALLBACK;
        render(data || FALLBACK);
      } catch (e) {
        console.error('개인정보처리방침 렌더 실패:', e);
        render(FALLBACK);
      }
    });
  </script>
