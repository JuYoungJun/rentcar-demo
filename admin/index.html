<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>관리자 - 해태렌트카</title>
<meta name="referrer" content="no-referrer">
<style>
  html,body{height:100%;margin:0;background:#0f172a;color:#cbd5e1;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif}
  .loader{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
  .spin{width:32px;height:32px;border:3px solid #1e293b;border-top-color:#E53935;border-radius:50%;animation:s 0.8s linear infinite}
  @keyframes s{to{transform:rotate(1turn)}}
  .txt{font-size:13px;color:#64748b}
  noscript .alert{margin:80px auto;max-width:480px;background:#1e293b;color:#fff;padding:24px;border-radius:8px;text-align:center;font-size:14px}
</style>
<script src="auth.js"></script>
</head>
<body>
<div class="loader">
  <div class="spin" aria-hidden="true"></div>
  <div class="txt">관리자 영역으로 이동 중…</div>
</div>
<noscript>
  <div class="alert">
    이 페이지는 JavaScript가 필요합니다.<br>브라우저 설정에서 JavaScript를 활성화한 후 다시 시도해 주세요.<br><br>
    <a href="login.html" style="color:#E53935">→ 수동으로 로그인 페이지 이동</a>
  </div>
</noscript>
<script>
  // 인증 상태에 따라 즉시 분기 — replace() 사용해서 뒤로가기 히스토리에 남기지 않음.
  (function () {
    try {
      if (window.AdminAuth && AdminAuth.isAuthenticated && AdminAuth.isAuthenticated()) {
        window.location.replace('dashboard.html');
      } else {
        window.location.replace('login.html');
      }
    } catch (e) {
      window.location.replace('login.html');
    }
  })();
</script>
</body>
</html>
