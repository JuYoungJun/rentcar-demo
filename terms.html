<body data-page="legal">

<div id="header-include"></div>

<main class="legal-doc" id="legalDoc">
  <h1 class="legal-title" id="legalTitle"></h1>
  <span class="legal-effective" id="legalEffective"></span>
  <div class="legal-intro" id="legalIntro"></div>
  <div id="legalSections"></div>
  <div class="legal-note" id="legalNote" hidden></div>
</main>

<div id="footer-include"></div>

<script src="js/common.js" defer></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (window.HaetaeSEO) {
    const S = window.HaetaeSEO;
    try {
      S.inject([
        S.webpage({
          type: 'WebPage',
          url: '/terms.html',
          title: '이용약관 — 해태렌트카',
          description: '서비스 이용 조건, 회원·이용자의 권리·의무, 계약 체결·해제, 면책 조항.',
          image: '/images/banner_1.webp',
          breadcrumb: S.breadcrumb([{ name:'홈', url:'/' }, { name:'이용약관', url:'/terms.html' }]),
          speakableSelectors: ['.legal-title', '.legal-section h2', '.legal-section p']
        }),
        {
          '@type': 'DigitalDocument',
          '@id': S.SITE + '/terms.html#document',
          name: '이용약관',
          inLanguage: 'ko-KR',
          publisher: { '@id': S.SITE + '/#organization' },
          about: { '@id': S.SITE + '/#localbusiness' }
        }
      ]);
    } catch (e) {}
  }

  const esc = s => String(s == null ? '' : s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[c]);
  const inline = s => esc(s).replace(/\n/g, '<br>').replace(/&lt;strong&gt;(.+?)&lt;\/strong&gt;/g, '<strong>$1</strong>');

  const FALLBACK = {
    title: '이용약관',
    effective: '시행일자 2026년 5월 8일',
    intro: '본 약관은 해태렌트카(이하 "회사")가 운영하는 웹사이트를 통해 제공하는 차량 임대차 정보 안내·견적 상담 서비스의 이용 조건과 절차에 관한 사항을 규정함을 목적으로 합니다.',
    sections: [
      { title: '제1조 (목적)', body: '본 약관은 회사가 제공하는 서비스의 이용에 관하여 회사와 이용자 사이의 권리·의무 및 책임사항, 기타 필요한 사항을 규정함을 목적으로 합니다.' },
      { title: '제2조 (서비스의 내용)', body: '회사는 월렌트, 기간약정월렌트, 중고차 장기렌트, 법인 렌트 등 차량 정보 제공·견적 상담·차량 임대차 계약 알선 서비스를 제공합니다.' },
      { title: '제3조 (서비스 이용 신청)', body: '이용자는 웹사이트 견적 문의 양식에 필수 항목을 기입하고 개인정보 수집·이용에 동의함으로써 서비스 이용을 신청할 수 있습니다.' },
      { title: '제4조 (이용자의 의무)', body: '이용자는 허위 정보 등록, 타인의 정보 도용, 회사의 업무 방해 행위 등을 하여서는 안 됩니다.' },
      { title: '제5조 (책임 제한)', body: '회사는 천재지변, 전쟁, 기간통신사업자의 서비스 중지 등 불가항력으로 인하여 서비스를 제공할 수 없는 경우에는 책임이 면제됩니다.' },
      { title: '부칙', body: '본 약관은 2026년 5월 8일부터 시행합니다.' },
    ],
    note: '[안내] 실제 운영 시에는 사업 형태와 개별 서비스 내용에 맞게 법무 검토 후 사용하시기 바랍니다.',
  };

  function render(data) {
    document.getElementById('legalTitle').textContent = data.title || '';
    document.getElementById('legalEffective').textContent = data.effective || '';
    document.getElementById('legalIntro').textContent = data.intro || '';
    const wrap = document.getElementById('legalSections');
    wrap.innerHTML = (data.sections || []).map(s => `
      <section class="legal-section">
        <h2>${esc(s.title)}</h2>
        <p>${inline(s.body)}</p>
      </section>
    `).join('');
    if (data.note) {
      const n = document.getElementById('legalNote');
      n.hidden = false;
      n.textContent = data.note;
    }
    document.title = (data.title || '문서') + ' - 해태렌트카';
  }

  try {
    const data = (typeof loadTerms === 'function') ? loadTerms() : FALLBACK;
    render(data || FALLBACK);
  } catch (e) {
    console.error('이용약관 렌더 실패:', e);
    render(FALLBACK);
  }
});
</script>
</body>
</html>
