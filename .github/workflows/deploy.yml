name: Deploy to Cafe24

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run'
        required: false
        default: 'false'

concurrency:
  group: deploy-cafe24
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://haetae1.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          missing=0
          for s in FTP_HOST FTP_USERNAME FTP_PASSWORD; do
            if [ -z "$(eval echo \$$s)" ]; then
              echo "::error::Secret $s is not configured"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to Cafe24
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT || '21' }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR || '/haitai888/www/' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          set -e

          MIRROR_ARGS="--verbose --parallel=1 --only-newer"

          if [ "$DRY_RUN" = "true" ]; then
            MIRROR_ARGS="$MIRROR_ARGS --dry-run"
            echo "Dry-run mode enabled"
          fi

          echo "Deploying to $FTP_SERVER_DIR"

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF
          set ftp:ssl-allow no
          set ftp:passive-mode on
          set net:timeout 30
          set net:max-retries 2
          set net:reconnect-interval-base 5

          cd $FTP_SERVER_DIR

          mirror -R $MIRROR_ARGS \
            --exclude-glob .git/ \
            --exclude-glob .git/** \
            --exclude-glob .github/ \
            --exclude-glob .github/** \
            --exclude-glob .claude/ \
            --exclude-glob .claude/** \
            --exclude-glob .vscode/ \
            --exclude-glob .vscode/** \
            --exclude-glob .idea/ \
            --exclude-glob .idea/** \
            --exclude-glob docs/ \
            --exclude-glob docs/** \
            --exclude-glob db/ \
            --exclude-glob db/** \
            --exclude-glob node_modules/ \
            --exclude-glob node_modules/** \
            --exclude-glob api/data/ \
            --exclude-glob api/data/** \
            --exclude-glob api/logs/ \
            --exclude-glob api/logs/** \
            --exclude-glob images/uploads/* \
            --exclude-glob README.md \
            --exclude-glob api/README.md \
            --exclude-glob .DS_Store \
            --exclude-glob Thumbs.db \
            --exclude-glob '*.log' \
            --exclude-glob '*.bak' \
            --exclude-glob '*.orig' \
            --exclude-glob '*.tmp' \
            --exclude-glob .gitignore \
            --exclude-glob .gitleaks.toml \
            --exclude-glob .gitkeep \
            --exclude-glob .well-known/ \
            --exclude-glob .well-known/** \
            ./ ./

          bye
          EOF

      - name: Health check post deploy
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          URL="${{ secrets.HEALTH_CHECK_URL }}"

          if [ -z "$URL" ]; then
            echo "::notice::HEALTH_CHECK_URL secret 이 설정되지 않아 헬스체크를 건너뜁니다."
            exit 0
          fi

          echo "Pinging $URL ..."

          for i in 1 2 3 4 5; do
            resp=$(curl -sS -w "\n%{http_code}" "$URL" || echo -e "\n000")
            code=$(echo "$resp" | tail -n1)
            body=$(echo "$resp" | sed '$d')

            if [ "$code" = "200" ]; then
              echo "$body" | head -c 500
              echo

              if echo "$body" | grep -q '"ok":[[:space:]]*true'; then
                echo "::notice::Health check OK"
                exit 0
              fi
            fi

            echo "Attempt $i: HTTP $code, retrying in 10s..."
            sleep 10
          done

          echo "::error::Health check failed after 5 attempts"
          exit 1
