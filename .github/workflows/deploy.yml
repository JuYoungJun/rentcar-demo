name: Deploy to Cafe24

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run'
        required: false
        default: 'false'

concurrency:
  group: deploy-cafe24
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: SFTP Deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://haetae1.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -e

          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::SSH_PRIVATE_KEY secret is empty"
            exit 1
          fi

          if [ -z "$SSH_HOST" ]; then
            echo "::error::SSH_HOST secret is empty"
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          echo "Checking private key format..."
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          echo "Private key is readable"

          ssh-keyscan -p 22 "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to Cafe24 via SFTP
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
        run: |
          set -e

          MIRROR_ARGS="--verbose=3 --parallel=1 --only-newer"

          if [ "$DRY_RUN" = "true" ]; then
            MIRROR_ARGS="$MIRROR_ARGS --dry-run"
            echo "Dry-run mode enabled"
          fi

          lftp <<EOF
          set sftp:connect-program "ssh -a -x -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -p 22"
          open -u "$SSH_USERNAME","" sftp://$SSH_HOST
          pwd
          cd www
          pwd

          mirror -R $MIRROR_ARGS \
            --exclude-glob .git/ \
            --exclude-glob .git/** \
            --exclude-glob .github/ \
            --exclude-glob .github/** \
            --exclude-glob .claude/ \
            --exclude-glob .claude/** \
            --exclude-glob .vscode/ \
            --exclude-glob .vscode/** \
            --exclude-glob .idea/ \
            --exclude-glob .idea/** \
            --exclude-glob docs/ \
            --exclude-glob docs/** \
            --exclude-glob db/ \
            --exclude-glob db/** \
            --exclude-glob node_modules/ \
            --exclude-glob node_modules/** \
            --exclude-glob api/data/ \
            --exclude-glob api/data/** \
            --exclude-glob api/logs/ \
            --exclude-glob api/logs/** \
            --exclude-glob images/uploads/* \
            --exclude-glob README.md \
            --exclude-glob api/README.md \
            --exclude-glob .DS_Store \
            --exclude-glob Thumbs.db \
            --exclude-glob '*.log' \
            --exclude-glob '*.bak' \
            --exclude-glob '*.orig' \
            --exclude-glob '*.tmp' \
            --exclude-glob .gitignore \
            --exclude-glob .gitleaks.toml \
            --exclude-glob .gitkeep \
            --exclude-glob .well-known/ \
            --exclude-glob .well-known/** \
            ./ ./

          bye
          EOF

      - name: Health check post deploy
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true' }}
        run: |
          URL="${{ secrets.HEALTH_CHECK_URL }}"

          if [ -z "$URL" ]; then
            echo "::notice::HEALTH_CHECK_URL secret 이 설정되지 않아 헬스체크를 건너뜁니다."
            exit 0
          fi

          echo "Pinging $URL ..."

          for i in 1 2 3 4 5; do
            resp=$(curl -sS -w "\n%{http_code}" "$URL" || echo -e "\n000")
            code=$(echo "$resp" | tail -n1)
            body=$(echo "$resp" | sed '$d')

            if [ "$code" = "200" ]; then
              echo "$body" | head -c 500
              echo

              if echo "$body" | grep -q '"ok":[[:space:]]*true'; then
                echo "::notice::Health check OK"
                exit 0
              fi
            fi

            echo "Attempt $i: HTTP $code, retrying in 10s..."
            sleep 10
          done

          echo "::error::Health check failed after 5 attempts"
          exit 1
