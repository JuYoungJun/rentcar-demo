name: Deploy to Cafe24

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run'
        required: false
        default: 'false'

concurrency:
  group: deploy-cafe24
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: FTP curl Deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://haetae1.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate FTP secrets
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -e

          missing=0
          for s in FTP_HOST FTP_USERNAME FTP_PASSWORD; do
            if [ -z "$(eval echo \$$s)" ]; then
              echo "::error::Secret $s is not configured"
              missing=1
            fi
          done

          [ "$missing" -eq 0 ]

      - name: Generate production config
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
        run: |
          set -e

          missing=0
          for s in DB_HOST DB_NAME DB_USER DB_PASS; do
            if [ -z "$(eval echo \$$s)" ]; then
              echo "::error::Secret $s is not configured"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

          python3 <<'PY'
          import os
          from pathlib import Path

          def php_str(value: str) -> str:
              return "'" + value.replace("\\", "\\\\").replace("'", "\\'") + "'"

          db_host = os.environ["DB_HOST"]
          db_name = os.environ["DB_NAME"]
          db_user = os.environ["DB_USER"]
          db_pass = os.environ["DB_PASS"]

          content = f"""<?php
          define('DB_HOST',   {php_str(db_host)});
          define('DB_NAME',   {php_str(db_name)});
          define('DB_USER',   {php_str(db_user)});
          define('DB_PASS',   {php_str(db_pass)});
          define('DB_CHARSET', 'utf8mb4');

          define('SESSION_TTL_SECONDS',  3600);
          define('IDLE_TIMEOUT_SECONDS', 1800);
          define('LOCKOUT_THRESHOLD',    5);
          define('LOCKOUT_SECONDS',      600);
          define('LOCKOUT_WINDOW',       900);

          define('ALLOWED_ORIGINS', [
            'https://www.haetae1.com',
            'https://haetae1.com',
          ]);

          define('PUBLIC_FORM_ALLOWED_HOSTS', [
            'www.haetae1.com',
            'haetae1.com',
            'localhost',
            '127.0.0.1',
          ]);

          define('NOTIFY_EMAIL_TO',   '');
          define('NOTIFY_EMAIL_FROM', 'noreply@haetae1.com');
          define('NOTIFY_SITE_NAME',  '해태렌트카');

          define('UPLOAD_DIR',         dirname(__DIR__) . '/images/uploads');
          define('UPLOAD_MAX_BYTES',   5 * 1024 * 1024);
          define('UPLOAD_ALLOWED_MIME', ['image/webp', 'image/jpeg', 'image/png']);
          define('UPLOAD_ALLOWED_EXT',  ['webp', 'jpg', 'jpeg', 'png']);

          define('IS_PRODUCTION', !in_array($_SERVER['SERVER_NAME'] ?? '', ['localhost', '127.0.0.1', ''], true));

          date_default_timezone_set('Asia/Seoul');
          mb_internal_encoding('UTF-8');
          mb_http_output('UTF-8');

          if (IS_PRODUCTION) {{
            error_reporting(0);
            ini_set('display_errors', '0');
          }} else {{
            error_reporting(E_ALL);
            ini_set('display_errors', '1');
          }}

          ini_set('session.cookie_httponly', '1');
          ini_set('session.cookie_secure',   IS_PRODUCTION ? '1' : '0');
          ini_set('session.cookie_samesite', 'Strict');
          ini_set('session.use_only_cookies', '1');
          """

          Path("api/_config.php").write_text(content, encoding="utf-8")
          PY

      - name: Build upload file list
        run: |
          set -e

          find . -type f \
            ! -path './.git/*' \
            ! -path './.github/*' \
            ! -path './.claude/*' \
            ! -path './.vscode/*' \
            ! -path './.idea/*' \
            ! -path './docs/*' \
            ! -path './db/*' \
            ! -path './node_modules/*' \
            ! -path './api/data/*' \
            ! -path './api/logs/*' \
            ! -path './images/uploads/*' \
            ! -name 'README.md' \
            ! -path './api/README.md' \
            ! -name '.DS_Store' \
            ! -name 'Thumbs.db' \
            ! -name '*.log' \
            ! -name '*.bak' \
            ! -name '*.orig' \
            ! -name '*.tmp' \
            ! -name '.gitignore' \
            ! -name '.gitleaks.toml' \
            ! -name '.gitkeep' \
            ! -path './.well-known/*' \
            | sed 's#^\./##' \
            | sort > /tmp/upload-files.txt

          echo "Files to upload:"
          wc -l /tmp/upload-files.txt
          head -n 30 /tmp/upload-files.txt

      - name: Probe Cafe24 FTP webroot
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true' }}
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -e

          echo "github-actions-probe" > /tmp/__gha_probe.txt

          echo "Trying FTP base: /www/"
          if curl --fail --show-error --silent --ftp-pasv --disable-epsv --ftp-method nocwd \
            --user "$FTP_USERNAME:$FTP_PASSWORD" \
            --upload-file /tmp/__gha_probe.txt \
            "ftp://$FTP_HOST/www/__gha_probe.txt"; then
            echo "www" > /tmp/ftp-base.txt
            echo "FTP base selected: /www/"
            exit 0
          fi

          echo "Trying FTP base: current directory"
          if curl --fail --show-error --silent --ftp-pasv --disable-epsv --ftp-method nocwd \
            --user "$FTP_USERNAME:$FTP_PASSWORD" \
            --upload-file /tmp/__gha_probe.txt \
            "ftp://$FTP_HOST/__gha_probe.txt"; then
            echo "" > /tmp/ftp-base.txt
            echo "FTP base selected: current directory"
            exit 0
          fi

          echo "::error::Cannot upload probe file to /www/ or current FTP directory"
          exit 1

      - name: Upload files to Cafe24 by FTP curl
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true' }}
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -e

          BASE="$(cat /tmp/ftp-base.txt)"
          TOTAL="$(wc -l < /tmp/upload-files.txt)"
          COUNT=0

          echo "Selected FTP base: /$BASE"
          echo "Total files: $TOTAL"

          while IFS= read -r file; do
            COUNT=$((COUNT + 1))

            if [ -n "$BASE" ]; then
              remote_path="$BASE/$file"
            else
              remote_path="$file"
            fi

            echo "[$COUNT/$TOTAL] Uploading $file -> $remote_path"

            curl --fail --show-error --silent --ftp-pasv --disable-epsv --ftp-method nocwd --ftp-create-dirs \
              --user "$FTP_USERNAME:$FTP_PASSWORD" \
              --upload-file "$file" \
              "ftp://$FTP_HOST/$remote_path"
          done < /tmp/upload-files.txt

          echo "FTP upload complete"

      - name: Dry-run summary
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
        run: |
          echo "Dry-run mode enabled. No files uploaded."
          cat /tmp/upload-files.txt

      - name: Health check post deploy
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true' }}
        run: |
          URL="${{ secrets.HEALTH_CHECK_URL }}"

          if [ -z "$URL" ]; then
            echo "::notice::HEALTH_CHECK_URL secret 이 설정되지 않아 헬스체크를 건너뜁니다."
            exit 0
          fi

          echo "Pinging $URL ..."

          for i in 1 2 3 4 5; do
            resp=$(curl -L -sS -w "\n%{http_code}" "$URL" || echo -e "\n000")
            code=$(echo "$resp" | tail -n1)
            body=$(echo "$resp" | sed '$d')

            if [ "$code" = "200" ]; then
              echo "$body" | head -c 500
              echo

              if echo "$body" | grep -q '"ok":[[:space:]]*true'; then
                echo "::notice::Health check OK"
                exit 0
              fi
            fi

            echo "Attempt $i: HTTP $code, retrying in 10s..."
            sleep 10
          done

          echo "::error::Health check failed after 5 attempts"
          exit 1