name: Deploy to Cafe24

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cafe24
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: SFTP Test Deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://haetae1.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -e

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          ssh-keyscan -p 22 "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: SFTP upload index only
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
        run: |
          set -e

          sftp \
            -vvv \
            -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -P 22 \
            "$SSH_USERNAME@$SSH_HOST" <<EOF
          pwd
          ls
          cd www
          pwd
          ls
          put index.html
          bye
          EOF
