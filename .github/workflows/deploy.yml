name: Deploy to Cafe24

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run'
        required: false
        default: 'false'

concurrency:
  group: deploy-cafe24
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://haetae1.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate required secrets
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          missing=0
          for s in FTP_HOST FTP_USERNAME FTP_PASSWORD; do
            if [ -z "$(eval echo \$$s)" ]; then
              echo "::error::Secret $s is not configured"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Deploy to Cafe24
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./
          server-dir: ./
          dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/.github
            **/.github/**
            **/.claude
            **/.claude/**
            **/.vscode
            **/.vscode/**
            **/.idea
            **/.idea/**
            **/docs
            **/docs/**
            **/db
            **/db/**
            **/node_modules
            **/node_modules/**
            **/api/data
            **/api/data/**
            **/api/logs
            **/api/logs/**
            **/images/uploads/*
            !**/images/uploads/.htaccess
            **/README.md
            **/api/README.md
            **/.DS_Store
            **/Thumbs.db
            **/*.log
            **/*.bak
            **/*.orig
            **/*.tmp
            **/.gitignore
            **/.gitleaks.toml
            **/.gitkeep
            **/.well-known
            **/.well-known/**

      - name: Health check post deploy
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true' }}
        run: |
          URL="${{ secrets.HEALTH_CHECK_URL }}"

          if [ -z "$URL" ]; then
            echo "::notice::HEALTH_CHECK_URL secret 이 설정되지 않아 헬스체크를 건너뜁니다."
            exit 0
          fi

          echo "Pinging $URL ..."

          for i in 1 2 3 4 5; do
            resp=$(curl -sS -w "\n%{http_code}" "$URL" || echo -e "\n000")
            code=$(echo "$resp" | tail -n1)
            body=$(echo "$resp" | sed '$d')

            if [ "$code" = "200" ]; then
              echo "$body" | head -c 500
              echo

              if echo "$body" | grep -q '"ok":[[:space:]]*true'; then
                echo "::notice::Health check OK"
                exit 0
              fi
            fi

            echo "Attempt $i: HTTP $code, retrying in 10s..."
            sleep 10
          done

          echo "::error::Health check failed after 5 attempts"
          exit 1
