name: Deploy to Cafe24

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run'
        required: false
        default: 'false'

concurrency:
  group: deploy-cafe24
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://haetae1.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass and rsync
        run: sudo apt-get update && sudo apt-get install -y sshpass rsync

      - name: Validate required secrets
        env:
          SSH_HOST: ${{ secrets.FTP_HOST }}
          SSH_USERNAME: ${{ secrets.FTP_USERNAME }}
          SSH_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          missing=0
          for s in SSH_HOST SSH_USERNAME SSH_PASSWORD; do
            if [ -z "$(eval echo \$$s)" ]; then
              echo "::error::Secret $s is not configured"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Prepare remote directories
        env:
          SSH_HOST: ${{ secrets.FTP_HOST }}
          SSH_USERNAME: ${{ secrets.FTP_USERNAME }}
          SSH_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sshpass -p "$SSH_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -p 22 \
            "$SSH_USERNAME@$SSH_HOST" \
            'mkdir -p ~/www/admin ~/www/api ~/www/css ~/www/images/uploads ~/www/includes ~/www/js'

      - name: Deploy to Cafe24
        env:
          SSH_HOST: ${{ secrets.FTP_HOST }}
          SSH_USERNAME: ${{ secrets.FTP_USERNAME }}
          SSH_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          set -e

          RSYNC_ARGS="-avz --checksum"

          if [ "$DRY_RUN" = "true" ]; then
            RSYNC_ARGS="$RSYNC_ARGS --dry-run"
            echo "Dry-run mode enabled"
          fi

          sshpass -p "$SSH_PASSWORD" rsync $RSYNC_ARGS \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p 22" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.claude/' \
            --exclude='.vscode/' \
            --exclude='.idea/' \
            --exclude='docs/' \
            --exclude='db/' \
            --exclude='node_modules/' \
            --exclude='api/data/' \
            --exclude='api/logs/' \
            --exclude='images/uploads/*' \
            --exclude='README.md' \
            --exclude='api/README.md' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            --exclude='*.log' \
            --exclude='*.bak' \
            --exclude='*.orig' \
            --exclude='*.tmp' \
            --exclude='.gitignore' \
            --exclude='.gitleaks.toml' \
            --exclude='.gitkeep' \
            --exclude='.well-known/' \
            ./ "$SSH_USERNAME@$SSH_HOST:~/www/"

      - name: Health check post deploy
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          URL="${{ secrets.HEALTH_CHECK_URL }}"

          if [ -z "$URL" ]; then
            echo "::notice::HEALTH_CHECK_URL secret 이 설정되지 않아 헬스체크를 건너뜁니다."
            exit 0
          fi

          echo "Pinging $URL ..."

          for i in 1 2 3 4 5; do
            resp=$(curl -sS -w "\n%{http_code}" "$URL" || echo -e "\n000")
            code=$(echo "$resp" | tail -n1)
            body=$(echo "$resp" | sed '$d')

            if [ "$code" = "200" ]; then
              echo "$body" | head -c 500
              echo

              if echo "$body" | grep -q '"ok":[[:space:]]*true'; then
                echo "::notice::Health check OK"
                exit 0
              fi
            fi

            echo "Attempt $i: HTTP $code, retrying in 10s..."
            sleep 10
          done

          echo "::error::Health check failed after 5 attempts"
          exit 1
