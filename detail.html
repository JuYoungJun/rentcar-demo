<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차량 상세 - 해태렌트카</title>
<meta name="description" content="해태렌트카 차량 상세 — 차종·연식·연료·변속·승차정원·월 임대료 안내, 1개월/6~24개월 약정/중고 장기 옵션 선택 가능.">
<meta name="keywords" content="차량상세,렌트카 견적,월렌트 차량,장기렌트 차량,해태렌트카">
<meta name="author" content="해태렌트카">

<meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1">
<meta name="geo.region" content="KR-29">
<meta name="geo.placename" content="광주광역시 광산구">
<meta name="geo.position" content="35.1399;126.7935">
<meta name="ICBM" content="35.1399, 126.7935">

<link rel="alternate" hreflang="ko-KR" href="https://www.haetae-rentcar.com/detail.html">
<link rel="alternate" hreflang="x-default" href="https://www.haetae-rentcar.com/detail.html">
<meta property="og:type" content="product">
<meta property="product:price:currency" content="KRW">
<meta property="og:site_name" content="해태렌트카">
<meta property="og:title" content="차량 상세 - 해태렌트카">
<meta property="og:description" content="차량 상세 정보 및 견적 문의 — 해태렌트카.">

<meta property="og:image" content="https://www.haetae-rentcar.com/images/banner_1.webp">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="해태렌트카 차량 상세">
<meta property="og:locale" content="ko_KR">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="차량 상세 - 해태렌트카">
<meta name="twitter:description" content="차량 상세 정보 및 견적 문의 — 해태렌트카.">
<meta name="twitter:image" content="https://www.haetae-rentcar.com/images/banner_1.webp">
<meta name="theme-color" content="#E53935">
<meta name="format-detection" content="telephone=yes">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="images/icon-192.png">
<link rel="apple-touch-icon" href="images/apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" onload="this.onload=null;this.rel=&apos;stylesheet&apos;">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap"></noscript>
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/pages.css">
<script src="js/seo-schema.js" defer></script>
<style>
.detail-wrap{max-width:975px;margin:0 auto;padding:0}
.breadcrumb{padding:14px 20px;font-size:13px;color:var(--text-light)}
.breadcrumb a{color:var(--text-light);transition:color .2s}
.breadcrumb a:hover{color:var(--red)}
.breadcrumb span{margin:0 6px}
.detail-image{width:100%;display:flex;align-items:center;justify-content:center;padding:10px 20px 16px;background:transparent}
.detail-image .img-placeholder{width:55%;aspect-ratio:16/9;background-color:transparent;background-size:contain;background-repeat:no-repeat;background-position:center;border-radius:8px}
.detail-info{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;padding:0 20px 20px}
.detail-badge{display:inline-block;background:var(--red);color:var(--white);font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px;margin-bottom:6px}
.detail-car-name{font-size:20px;font-weight:900;color:var(--dark);margin-bottom:2px}
.detail-info-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.detail-price{font-size:20px;font-weight:900;color:var(--dark)}
.detail-price--inquiry{font-size:18px;color:var(--red);display:inline-flex;align-items:center;gap:8px}
.detail-price--inquiry::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 0 4px rgba(229,57,53,0.15)}
.btn-inquire{background:var(--red);color:var(--white);border:none;padding:10px 20px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s;white-space:nowrap}
.btn-inquire:hover{background:var(--red-hover)}
.detail-banners{display:flex;flex-direction:column;align-items:center}
.detail-banners img{max-width:100%;height:auto;display:block;margin:0 auto}
.detail-banners .clickable{cursor:pointer}
.detail-long-image{display:flex;flex-direction:column;align-items:center}
.detail-long-image img{max-width:100%;height:auto;display:block;margin:0 auto}

/* 새 섹션 — 스펙 / 설명 / 옵션 */
.detail-spec{padding:8px 20px 18px}
.detail-spec-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.detail-spec-item{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#f7f8fa;border-radius:8px;border:1px solid #eef0f3;font-size:13px}
.detail-spec-item .spec-key{color:#6b7280;font-size:11.5px;font-weight:600;width:54px;flex-shrink:0}
.detail-spec-item .spec-val{color:#111827;font-weight:700}
.detail-desc,.detail-features{padding:0 20px 22px}
.detail-section-title{font-size:15px;font-weight:800;color:#111827;margin-bottom:10px;letter-spacing:-0.3px}
#detailDesc{font-size:13.5px;line-height:1.7;color:#374151;white-space:pre-line}
#detailFeatures{list-style:none;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px 16px}
#detailFeatures li{font-size:13px;color:#374151;padding-left:20px;position:relative;line-height:1.6}
#detailFeatures li::before{content:'✓';position:absolute;left:0;top:0;color:var(--red);font-weight:800}

@media(max-width:800px){
  .detail-wrap{max-width:100%}
}
@media(max-width:480px){
  .breadcrumb{padding:10px 16px;font-size:12px}
  .detail-image{padding:10px 16px 12px}
  .detail-image .img-placeholder{width:70%}
  .detail-info{padding:0 16px 16px;flex-direction:column;align-items:flex-start}
  .detail-info-right{width:100%;justify-content:space-between}
  .detail-spec,.detail-desc,.detail-features{padding-left:16px;padding-right:16px}
  .detail-section-title{font-size:14px}
}
</style>
</head>
<body data-page="monthly">
<div id="header-include"></div>

<div class="detail-wrap">
  <div class="breadcrumb">
    <a href="index.html">홈</a><span>&gt;</span>
    <a href="monthly.html" id="bcCategory">월렌트</a><span>&gt;</span>
    <span id="bcCarName">2021 K5 DL3</span>
  </div>

  <div class="detail-image"><div class="img-placeholder"></div></div>

  <div class="detail-info">
    <div class="detail-info-left">
      <div class="detail-badge" id="detailBadge">1개월</div>
      <h1 class="detail-car-name" id="detailName">K5 DL3</h1>
    </div>
    <div class="detail-info-right">
      <div class="detail-price" id="detailPrice">650,000 원</div>
      <button class="btn-inquire" id="btnInquire">문의하기</button>
    </div>
  </div>

  <!-- 차량 스펙 (관리자에서 채우면 자동 노출) -->
  <div class="detail-spec" id="detailSpec" hidden>
    <div class="detail-spec-row" id="detailSpecGrid"></div>
  </div>

  <!-- 차량 설명 -->
  <div class="detail-desc" id="detailDescWrap" hidden>
    <h3 class="detail-section-title">차량 소개</h3>
    <p id="detailDesc"></p>
  </div>

  <!-- 주요 옵션·특징 -->
  <div class="detail-features" id="detailFeaturesWrap" hidden>
    <h3 class="detail-section-title">주요 옵션·특징</h3>
    <ul id="detailFeatures"></ul>
  </div>

  <div class="detail-banners">
    <img src="images/detail-page.webp" alt="해태렌트카 상세 안내" class="clickable" id="bannerCta" decoding="async" width="1200" height="9678" fetchpriority="high">
  </div>
  <!-- 차량별 상세 통이미지 (관리자에서 설정 시 노출) -->
  <div class="detail-long-image" id="detailLongImage" hidden>
    <img id="detailLongImageImg" alt="" loading="lazy" decoding="async">
  </div>
</div>

<div id="footer-include"></div>

<script src="js/common.js" defer></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const carId = parseInt(params.get('id')) || 1;
  const fromPage = params.get('from') || 'monthly';
  const car = carDatabase.find(c => c.id === carId) || carDatabase[0];

  // 실제 조회 1회 기록 — 금주 TOP 5 산정에 반영됨
  if (car && typeof trackCarView === 'function') trackCarView(car.id);
  // 운영 모드: 서버측 활동 로그(cars.views +1, activity INSERT)
  if (car && typeof window.trackServerCarView === 'function') window.trackServerCarView(car.id);

  if (car) {
    document.getElementById('bcCarName').textContent = car.name;
    document.getElementById('detailName').textContent = car.name;
    document.getElementById('detailBadge').textContent = car.badge || '1개월';
    // 중고차 장기렌트는 가격 대신 "별도문의" 노출
    const priceEl = document.getElementById('detailPrice');
    if (fromPage === 'used') {
      priceEl.textContent = '별도문의';
      priceEl.classList.add('detail-price--inquiry');
    } else {
      priceEl.textContent = car.price.toLocaleString() + ' 원';
    }
    document.title = car.name + ' - 해태렌트카';
    if (car.image) {
      const detailImg = document.querySelector('.detail-image .img-placeholder');
      if (detailImg) detailImg.style.backgroundImage = `url('${carImageUrl(car.image)}')`;
    }

    // ── 스펙 그리드 ──
    const specItems = [];
    if (car.fuelType)     specItems.push(['연료', car.fuelType]);
    if (car.transmission) specItems.push(['변속', car.transmission]);
    if (car.seats)        specItems.push(['승차', car.seats + '인승']);
    if (car.mileage)      specItems.push(['주행', car.mileage.toLocaleString() + ' km']);
    if (specItems.length) {
      document.getElementById('detailSpec').hidden = false;
      document.getElementById('detailSpecGrid').innerHTML = specItems.map(([k,v]) =>
        `<div class="detail-spec-item"><span class="spec-key">${k}</span><span class="spec-val">${v}</span></div>`
      ).join('');
    }
    // ── 설명 ──
    if (car.description && car.description.trim()) {
      document.getElementById('detailDescWrap').hidden = false;
      document.getElementById('detailDesc').textContent = car.description;
    }
    // ── 옵션·특징 ──
    if (Array.isArray(car.features) && car.features.length) {
      document.getElementById('detailFeaturesWrap').hidden = false;
      document.getElementById('detailFeatures').innerHTML = car.features
        .map(f => `<li>${String(f).replace(/[<>]/g,'')}</li>`).join('');
    }
    // ── 상세 페이지 통이미지 (선택적) ──
    if (car.detailImage) {
      const longWrap = document.getElementById('detailLongImage');
      const longImg  = document.getElementById('detailLongImageImg');
      if (longWrap && longImg) {
        longImg.src = carImageUrl(car.detailImage);
        longImg.alt = car.name + ' 상세 안내';
        longWrap.hidden = false;
        // 통이미지가 있으면 기본 안내 배너는 숨김 (중복 방지)
        const defaultWrap = document.querySelector('.detail-banners');
        if (defaultWrap) defaultWrap.hidden = true;
      }
    }

    const bcCat = document.getElementById('bcCategory');
    if (fromPage === 'longterm') { bcCat.href = 'longterm.html'; bcCat.textContent = '기간약정월렌트'; document.body.dataset.page = 'longterm'; }
    else if (fromPage === 'used') { bcCat.href = 'used.html'; bcCat.textContent = '중고차 장기렌트'; document.body.dataset.page = 'used'; }
    else { bcCat.href = 'monthly.html'; bcCat.textContent = '월렌트'; document.body.dataset.page = 'monthly'; }
    if (typeof window.setActiveNav === 'function') window.setActiveNav();

    // ── 동적 SEO 메타 업데이트 (크롤러는 정적 메타만 읽지만, 소셜 미리보기·일부 봇은 갱신 반영) ──
    const fromLabel  = fromPage === 'longterm' ? '기간약정월렌트' : fromPage === 'used' ? '중고차 장기렌트' : '월렌트';
    const fromPath   = fromPage === 'longterm' ? '/longterm.html' : fromPage === 'used' ? '/used.html' : '/monthly.html';
    const carUrl     = 'https://www.haetae-rentcar.com/detail.html?id=' + car.id + '&from=' + fromPage;
    const carImage   = car.image ? ('https://www.haetae-rentcar.com/images/' + car.image) : 'https://www.haetae-rentcar.com/images/banner_1.webp';
    const newTitle   = car.name + ' ' + fromLabel + ' (월 ' + (car.price ? car.price.toLocaleString() : '문의') + '원) — 해태렌트카';
    const newDesc    = '해태렌트카 ' + fromLabel + ' — ' + car.name + ', 월 임대료 ' + (car.price ? car.price.toLocaleString() + '원' : '상담') +
                       (car.fuelType ? ', ' + car.fuelType : '') + (car.transmission ? ', ' + car.transmission : '') +
                       (car.seats ? ', ' + car.seats + '인승' : '') + '. 무심사·무보증 옵션 포함, 광주 광산구 신창동 영업장 운영.';

    document.title = newTitle;
    const setMeta = (selector, attr, value) => {
      const el = document.querySelector(selector);
      if (el) el.setAttribute(attr, value);
    };
    setMeta('meta[name="description"]',   'content', newDesc);
    setMeta('meta[property="og:title"]',  'content', newTitle);
    setMeta('meta[property="og:description"]', 'content', newDesc);
    setMeta('meta[property="og:url"]',    'content', carUrl);
    setMeta('meta[property="og:image"]',  'content', carImage);
    setMeta('meta[property="og:image:alt"]', 'content', car.name + ' — ' + fromLabel);
    setMeta('meta[name="twitter:title"]', 'content', newTitle);
    setMeta('meta[name="twitter:description"]', 'content', newDesc);
    setMeta('meta[name="twitter:image"]', 'content', carImage);
    setMeta('link[rel="canonical"]',      'href',    carUrl);
    // product:price:amount (OG product)
    let priceMeta = document.querySelector('meta[property="product:price:amount"]');
    if (!priceMeta) {
      priceMeta = document.createElement('meta');
      priceMeta.setAttribute('property', 'product:price:amount');
      document.head.appendChild(priceMeta);
    }
    priceMeta.setAttribute('content', String(car.price || 0));

    // ── SEO / GEO / AEO JSON-LD ──
    if (window.HaetaeSEO) {
      const S = window.HaetaeSEO;
      try {
        S.inject([
          S.webpage({
            type: 'ItemPage',
            url: '/detail.html?id=' + car.id + '&from=' + fromPage,
            title: newTitle,
            description: newDesc,
            image: '/images/' + (car.image || 'banner_1.webp'),
            breadcrumb: S.breadcrumb([
              { name: '홈',      url: '/' },
              { name: fromLabel, url: fromPath },
              { name: car.name,  url: '/detail.html?id=' + car.id + '&from=' + fromPage }
            ]),
            speakableSelectors: ['.detail-car-name', '.detail-price', '#detailDesc']
          }),
          S.vehicleProduct(car, fromPage)
        ]);
      } catch (e) {}
    }
  }

  // 카테고리별 기본 상세 배너 — 월렌트는 기존 admin 설정(detail-page.webp) 유지,
  // 12개월/중고차는 전용 이미지 적용
  if (!(car && car.detailImage)) {
    const cta = document.getElementById('bannerCta');
    if (fromPage === 'longterm') {
      if (cta) {
        cta.src = 'images/detail_longterm.jpg';
        cta.setAttribute('width', '1200');
        cta.setAttribute('height', '9523');
      }
    } else if (fromPage === 'used') {
      if (cta) {
        cta.src = 'images/detail_used.webp';
        cta.setAttribute('width', '1200');
        cta.setAttribute('height', '9775');
      }
    } else {
      // 월렌트 — 기존 admin 설정 그대로 사용
      if (typeof loadSettings === 'function') {
        const s = loadSettings();
        const banner = s.defaultDetailBanner && String(s.defaultDetailBanner).trim();
        if (banner) {
          if (cta) cta.src = carImageUrl(banner);
        } else {
          const wrap = document.querySelector('.detail-banners');
          if (wrap) wrap.hidden = true;
        }
      }
    }
    // 차량 컨텍스트가 있으면 alt 도 차량명 포함하여 SEO/접근성 향상
    if (cta && car && car.name) cta.alt = `${car.name} ${fromLabel} 상세 안내 — 해태렌트카`;
  }

  document.getElementById('btnInquire').onclick = () => window.location.href = 'index.html#contact';
  document.getElementById('bannerCta').onclick = () => window.location.href = 'index.html#contact';
});
</script>
</body>
</html>
